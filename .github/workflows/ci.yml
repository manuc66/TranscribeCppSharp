name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          VERSION=$(cat TRANSCRIBE_VERSION | xargs)
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            FINAL_VERSION=${GITHUB_REF#refs/tags/v}
          elif [[ $GITHUB_REF == refs/heads/main ]]; then
            FINAL_VERSION="${VERSION}-preview.${GITHUB_RUN_NUMBER}"
          else
            FINAL_VERSION="${VERSION}-dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${FINAL_VERSION}" >> $GITHUB_OUTPUT

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - run: dotnet restore

      - run: dotnet build --no-restore
      
      - name: Cache native libraries
        uses: actions/cache@v4
        with:
          path: native-packages
          key: native-libs-${{ runner.os }}-${{ hashFiles('fetch-native.sh') }}

      - name: Cache test assets
        uses: actions/cache@v4
        with:
          path: |
            test-models
            test-audio
          key: test-assets-${{ hashFiles('run-integration-tests.sh') }}

      - name: Fetch native libraries
        run: chmod +x fetch-native.sh && ./fetch-native.sh

      - name: Run tests (including integration)
        run: chmod +x run-integration-tests.sh && ./run-integration-tests.sh

  check-bindings-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Regenerate bindings and check for drift
        run: |
          chmod +x regenerate-bindings.sh
          ./regenerate-bindings.sh
          if ! git diff --quiet generated/TranscribeCppSharp.Interop/NativeMethods.cs; then
            echo "ERROR: NativeMethods.cs is out of sync with TRANSCRIBE_VERSION"
            echo "Run ./regenerate-bindings.sh and commit the result"
            git diff generated/TranscribeCppSharp.Interop/NativeMethods.cs
            exit 1
          fi

  smoke-test:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - run: dotnet build samples/SmokeTest -c Release

      - name: Cache native libraries
        uses: actions/cache@v4
        with:
          path: native-packages
          key: native-libs-${{ runner.os }}-${{ hashFiles('fetch-native.sh') }}

      - name: Cache test assets
        uses: actions/cache@v4
        with:
          path: |
            test-models
            test-audio
          key: test-assets-${{ hashFiles('run-integration-tests.sh') }}

      - run: chmod +x fetch-native.sh && ./fetch-native.sh

      - name: Run smoke test
        run: |
          # The model and audio are needed for smoke test too
          mkdir -p test-models test-audio
          [ -f test-models/ggml-tiny.bin ] || curl -L -o test-models/ggml-tiny.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin
          [ -f test-audio/jfk.wav ] || curl -L -o test-audio/jfk.wav https://github.com/ggerganov/whisper.cpp/raw/master/samples/jfk.wav
          
          LD_LIBRARY_PATH=native-packages/linux-x64/runtimes/linux-x64/native:$LD_LIBRARY_PATH \
          dotnet run --project samples/SmokeTest -c Release --no-build -- \
          test-models/ggml-tiny.bin test-audio/jfk.wav

  pack-native:
    needs: [get-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Cache native libraries
        uses: actions/cache@v4
        with:
          path: native-packages
          key: native-libs-${{ runner.os }}-${{ hashFiles('fetch-native.sh') }}

      - run: chmod +x fetch-native.sh && ./fetch-native.sh

      - name: Pack native NuGets
        run: |
          for dir in native-packages/win-x64 native-packages/linux-x64 native-packages/linux-arm64 native-packages/osx-arm64 native-packages/osx-x64; do
            dotnet pack "$dir" -c Release -o nupkgs /p:Version=${{ needs.get-version.outputs.version }}
          done

      - uses: actions/upload-artifact@v4
        with:
          name: native-nupkg
          path: nupkgs/*.nupkg

  pack-interop:
    needs: [build-and-test, get-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Pack Interop NuGet
        run: dotnet pack generated/TranscribeCppSharp.Interop -c Release -o nupkgs /p:Version=${{ needs.get-version.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: interop-nupkg
          path: nupkgs/*.nupkg

  pack-wrapper:
    needs: [build-and-test, get-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Pack Wrapper NuGet
        run: dotnet pack src/TranscribeCppSharp -c Release -o nupkgs /p:Version=${{ needs.get-version.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: wrapper-nupkg
          path: nupkgs/*.nupkg

  push-nugets:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [pack-native, pack-interop, pack-wrapper]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: nupkgs
          pattern: '*-nupkg'
          merge-multiple: true

      - name: Push all NuGets to GitHub Packages
        run: dotnet nuget push "nupkgs/*.nupkg" --source "https://nuget.pkg.github.com/manuc66/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [push-nugets]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: nupkgs
          pattern: '*-nupkg'
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: nupkgs/*.nupkg
          generate_release_notes: true
