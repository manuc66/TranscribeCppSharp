name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - run: dotnet restore

      - run: dotnet build --no-restore

      - run: dotnet test --no-build --verbosity normal

  check-bindings-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Regenerate bindings and check for drift
        run: |
          chmod +x regenerate-bindings.sh
          ./regenerate-bindings.sh
          if ! git diff --quiet generated/TranscribeCppSharp.Interop/NativeMethods.cs; then
            echo "ERROR: NativeMethods.cs is out of sync with TRANSCRIBE_VERSION"
            echo "Run ./regenerate-bindings.sh and commit the result"
            git diff generated/TranscribeCppSharp.Interop/NativeMethods.cs
            exit 1
          fi

  smoke-test:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - run: dotnet build samples/SmokeTest -c Release

      - run: chmod +x fetch-native.sh && ./fetch-native.sh

      - name: Run smoke test
        run: LD_LIBRARY_PATH=native-packages/linux-x64/runtimes/linux-x64/native:$LD_LIBRARY_PATH dotnet run --project samples/SmokeTest -c Release --no-build

  pack-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: chmod +x fetch-native.sh && ./fetch-native.sh

      - name: Pack native NuGets
        run: |
          for dir in native-packages/win-x64 native-packages/linux-x64 native-packages/linux-arm64 native-packages/osx-arm64 native-packages/osx-x64; do
            dotnet pack "$dir" -c Release -o nupkgs
          done

      - uses: actions/upload-artifact@v4
        with:
          name: native-nupkgs
          path: nupkgs/*.nupkg

  pack-interop:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Pack Interop NuGet
        run: dotnet pack generated/TranscribeCppSharp.Interop -c Release -o nupkgs

      - uses: actions/upload-artifact@v4
        with:
          name: interop-nupkg
          path: nupkgs/*.nupkg

  pack-wrapper:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Pack Wrapper NuGet
        run: dotnet pack src/TranscribeCppSharp -c Release -o nupkgs

      - uses: actions/upload-artifact@v4
        with:
          name: wrapper-nupkg
          path: nupkgs/*.nupkg

  push-nugets:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [pack-native, pack-interop, pack-wrapper]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: nupkgs
          pattern: '*-nupkg'
          merge-multiple: true

      - name: Push all NuGets to GitHub Packages
        run: dotnet nuget push "nupkgs/*.nupkg" --source "https://nuget.pkg.github.com/manuc66/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
